{{- if .Values.platforms.aws.nlbHealth.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-nlb-health
  namespace: {{ .Release.Namespace }}
  annotations:
    alb.ingress.kubernetes.io/group.name: {{ .Values.platforms.aws.nlbHealth.groupName }}
    alb.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: {{ .Values.platforms.aws.nlbHealth.path }}
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-nlb-health
            port:
              number: 80
{{- end }}
