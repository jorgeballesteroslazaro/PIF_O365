{{- if .Values.platforms.aws.nlbHealth.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-nlb-health
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nlb-health
  template:
    metadata:
      labels:
        app: nlb-health
    spec:
      containers:
      - name: health
        image: hashicorp/http-echo
        args:
          - "-text=OK"
        ports:
          - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-nlb-health
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: nlb-health
  ports:
    - port: 80
      targetPort: 8080
{{- end }}